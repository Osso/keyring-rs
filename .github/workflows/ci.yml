name: CI

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout path dependencies
        run: |
          sudo mkdir -p /syncthing/Sync/Projects/system /syncthing/Sync/Projects/lib
          sudo chown -R $USER:$USER /syncthing
          git clone --depth 1 https://github.com/Osso/authd /syncthing/Sync/Projects/system/authd
          git clone --depth 1 https://github.com/Osso/peercred-ipc /syncthing/Sync/Projects/lib/peercred-ipc

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run formatter
        run: cargo fmt --all -- --check

      - name: Run tests
        run: cargo test

      - name: Run clippy
        run: cargo clippy --all-targets --all-features

  dbus-integration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout path dependencies
        run: |
          sudo mkdir -p /syncthing/Sync/Projects/system /syncthing/Sync/Projects/lib
          sudo chown -R $USER:$USER /syncthing
          git clone --depth 1 https://github.com/Osso/authd /syncthing/Sync/Projects/system/authd
          git clone --depth 1 https://github.com/Osso/peercred-ipc /syncthing/Sync/Projects/lib/peercred-ipc

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install dbus-run-session and secret-tool
        run: |
          sudo apt-get update
          sudo apt-get install -y dbus dbus-x11 libsecret-tools llvm

      - name: Run ignored D-Bus integration tests
        run: ./scripts/run_dbus_integration_tests.sh

  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout path dependencies
        run: |
          sudo mkdir -p /syncthing/Sync/Projects/system /syncthing/Sync/Projects/lib
          sudo chown -R $USER:$USER /syncthing
          git clone --depth 1 https://github.com/Osso/authd /syncthing/Sync/Projects/system/authd
          git clone --depth 1 https://github.com/Osso/peercred-ipc /syncthing/Sync/Projects/lib/peercred-ipc

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install dbus-run-session and secret-tool
        run: |
          sudo apt-get update
          sudo apt-get install -y dbus dbus-x11 libsecret-tools llvm

      - name: Run coverage and enforce module thresholds
        run: ./scripts/run_coverage_ci.sh

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-artifacts
          path: target/llvm-cov
